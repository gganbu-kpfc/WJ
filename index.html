<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>원주청년소상공인협회 | 공식 홈페이지</title>

  <!--
    ============================================================================
    원주청년소상공인협회 공식 홈페이지 단일 파일 버전
    - GitHub Pages 업로드용 index.html
    - HTML / CSS / JS 한 파일 통합
    - 반응형 / 모바일 메뉴 / 검색 / 배지 필터 / 모달 / FAQ / 게시판 샘플
    - Supabase 연동을 위한 쉬운 가이드 포함
    ============================================================================
  -->

  <!-- 외부 라이브러리 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

  <style>
    /* ========================================================================
       01. CSS 변수 / 리셋
       ======================================================================== */
    :root {
      --white: #ffffff;
      --black: #121212;
      --text-main: #14212b;
      --text-sub: #5f6c77;
      --text-soft: #7d8a94;
      --line: #e6eef0;
      --line-strong: #d8e4e6;
      --bg-1: #f7fbfb;
      --bg-2: #f3f8f8;
      --bg-3: #f7f9fc;
      --bg-dark: #0d2238;
      --green: #00a98e;
      --green-dark: #008d76;
      --green-soft: #ddf7f2;
      --navy: #002d5d;
      --navy-light: #123e71;
      --navy-soft: #e8eff9;
      --gold-soft: #fff5d7;
      --gold-text: #8e6b00;
      --danger-soft: #ffecef;
      --danger-text: #b02e4b;
      --shadow-sm: 0 8px 20px rgba(12, 30, 49, 0.06);
      --shadow-md: 0 18px 40px rgba(9, 33, 57, 0.10);
      --shadow-lg: 0 24px 60px rgba(0, 24, 44, 0.14);
      --radius-xs: 10px;
      --radius-sm: 14px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 34px;
      --container: 1240px;
      --header-height: 82px;
      --transition: all 0.28s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
      word-break: keep-all;
    }

    img {
      display: block;
      width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
    }

    ul,
    ol {
      list-style: none;
    }

    .container {
      width: min(100%, var(--container));
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .section {
      position: relative;
      padding-top: 110px;
      padding-bottom: 110px;
    }

    .section-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 42px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--green-soft);
      color: var(--green-dark);
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      letter-spacing: -0.04em;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .section-desc {
      max-width: 760px;
      font-size: 1.05rem;
      color: var(--text-sub);
    }

    .muted {
      color: var(--text-soft);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--white);
      border: 1px solid var(--line-strong);
      font-size: 0.94rem;
      font-weight: 700;
      transition: var(--transition);
    }

    .chip:hover,
    .chip.active {
      color: var(--white);
      background: var(--navy);
      border-color: var(--navy);
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 14px;
      font-weight: 800;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: var(--white);
      box-shadow: 0 14px 28px rgba(0, 169, 142, 0.18);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(0, 169, 142, 0.24);
    }

    .btn-outline {
      background: var(--white);
      color: var(--navy);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: var(--shadow-sm);
    }

    .btn-outline:hover {
      transform: translateY(-2px);
    }

    .btn-navy {
      background: var(--navy);
      color: var(--white);
    }

    .btn-navy:hover {
      transform: translateY(-2px);
      background: var(--navy-light);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .badge-benefit {
      color: var(--green-dark);
      background: var(--green-soft);
    }

    .badge-executive {
      color: var(--gold-text);
      background: var(--gold-soft);
    }

    .badge-board {
      color: var(--danger-text);
      background: var(--danger-soft);
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--line);
    }

    .desktop-only {
      display: block;
    }

    .mobile-only {
      display: none;
    }

    /* ========================================================================
       02. 헤더
       ======================================================================== */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-height);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      z-index: 2000;
      border-bottom: 1px solid rgba(224, 234, 236, 0.9);
      transition: var(--transition);
    }

    .site-header.scrolled {
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 12px 28px rgba(9, 32, 54, 0.07);
    }

    .header-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--green), var(--navy));
      display: grid;
      place-items: center;
      color: var(--white);
      font-size: 1.05rem;
      flex-shrink: 0;
      box-shadow: 0 12px 24px rgba(0, 45, 93, 0.16);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      font-size: 1.08rem;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 0.82rem;
      color: var(--text-sub);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .desktop-nav a {
      position: relative;
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.02em;
      transition: var(--transition);
    }

    .desktop-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -8px;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: var(--green);
      transition: var(--transition);
    }

    .desktop-nav a:hover::after {
      width: 100%;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-login,
    .header-join {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .header-login {
      border: 1px solid var(--line-strong);
      color: var(--navy);
      background: var(--white);
    }

    .header-join {
      background: var(--navy);
      color: var(--white);
    }

    .mobile-menu-btn {
      display: none;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: var(--white);
      color: var(--navy);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .mobile-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: min(88vw, 360px);
      height: 100vh;
      background: var(--white);
      z-index: 2300;
      box-shadow: -16px 0 40px rgba(0, 20, 38, 0.12);
      padding: 24px 20px 28px;
      transition: right 0.28s ease;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .mobile-panel.open {
      right: 0;
    }

    .mobile-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-panel-close {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: var(--white);
      color: var(--navy);
    }

    .mobile-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .mobile-nav a {
      padding: 14px 14px;
      border-radius: 14px;
      background: var(--bg-2);
      color: var(--navy);
      font-weight: 800;
    }

    .mobile-panel-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 18, 31, 0.46);
      z-index: 2200;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .mobile-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    /* ========================================================================
       03. 히어로
       ======================================================================== */
    .hero {
      position: relative;
      padding-top: calc(var(--header-height) + 46px);
      padding-bottom: 68px;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(0, 169, 142, 0.18), transparent 26%),
        radial-gradient(circle at 88% 20%, rgba(0, 45, 93, 0.12), transparent 22%),
        linear-gradient(145deg, #f8fcfc 0%, #ffffff 38%, #f2f7fb 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -140px -120px auto;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 169, 142, 0.12), transparent 65%);
      filter: blur(10px);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 92%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 30px;
      align-items: stretch;
    }

    .hero-copy {
      padding-top: 26px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 169, 142, 0.14);
      color: var(--green-dark);
      font-weight: 900;
      font-size: 0.92rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 1.08;
      letter-spacing: -0.055em;
      color: var(--navy);
      font-weight: 900;
      max-width: 760px;
    }

    .hero-title .accent {
      color: var(--green);
    }

    .hero-desc {
      max-width: 700px;
      margin-top: 20px;
      font-size: 1.13rem;
      color: var(--text-sub);
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .hero-note-list {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .hero-note {
      padding: 18px 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(0, 45, 93, 0.08);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
    }

    .hero-note strong {
      display: block;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .hero-note span {
      color: var(--text-sub);
      font-size: 0.95rem;
    }

    .hero-panel {
      position: relative;
      min-height: 620px;
      display: flex;
      align-items: stretch;
    }

    .hero-panel-card {
      position: relative;
      width: 100%;
      min-height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(150deg, #07386c 0%, #0d2342 52%, #071521 100%);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 28px;
      color: var(--white);
    }

    .hero-panel-card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 169, 142, 0.35), transparent 70%);
    }

    .hero-panel-card::after {
      content: "";
      position: absolute;
      bottom: -80px;
      left: -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 70%);
    }

    .hero-panel-top {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .hero-panel-top .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(8px);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .hero-panel-grid {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .hero-panel-box {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
    }

    .hero-panel-box strong {
      display: block;
      font-size: 1.03rem;
      margin-bottom: 8px;
      font-weight: 900;
    }

    .hero-panel-box p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .hero-panel-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed rgba(255, 255, 255, 0.22);
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.92rem;
      font-weight: 700;
    }

    /* ========================================================================
       04. 공지 마키 / 검색
       ======================================================================== */
    .notice-strip-wrap {
      position: relative;
      z-index: 5;
      margin-top: -24px;
    }

    .notice-strip {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 16px 18px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow-md);
    }

    .notice-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      background: var(--navy);
      color: var(--white);
      border-radius: 14px;
      font-weight: 900;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .notice-marquee {
      overflow: hidden;
      position: relative;
      min-height: 28px;
    }

    .notice-track {
      display: flex;
      align-items: center;
      gap: 42px;
      width: max-content;
      animation: marquee 24s linear infinite;
    }

    .notice-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      font-weight: 800;
      color: var(--navy);
    }

    .notice-item span {
      color: var(--green-dark);
      font-size: 0.86rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--green-soft);
      font-weight: 900;
    }

    .notice-link {
      font-weight: 900;
      color: var(--navy);
      white-space: nowrap;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    .search-area {
      padding-top: 34px;
      padding-bottom: 26px;
      background: linear-gradient(180deg, transparent 0%, rgba(243, 248, 248, 0.46) 100%);
    }

    .search-shell {
      display: grid;
      gap: 16px;
      padding: 24px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow-md);
    }

    .search-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      color: var(--navy);
      font-size: 1.18rem;
      letter-spacing: -0.03em;
    }

    .search-count {
      font-weight: 800;
      color: var(--text-sub);
      font-size: 0.95rem;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input-wrap i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--green-dark);
      font-size: 1rem;
    }

    .search-input {
      width: 100%;
      height: 58px;
      padding-left: 50px;
      padding-right: 16px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: var(--bg-1);
      outline: none;
      color: var(--text-main);
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: rgba(0, 169, 142, 0.5);
      box-shadow: 0 0 0 4px rgba(0, 169, 142, 0.08);
      background: var(--white);
    }

    .search-reset {
      min-width: 126px;
      height: 58px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: var(--white);
      color: var(--navy);
      font-weight: 900;
    }

    .filter-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-state {
      display: none;
      padding: 28px 18px;
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: 20px;
      background: var(--bg-1);
      color: var(--text-sub);
      font-weight: 700;
    }

    .empty-state.show {
      display: block;
    }

    /* ========================================================================
       05. 협회소개
       ======================================================================== */
    .about-section {
      background:
        linear-gradient(180deg, var(--white) 0%, #fbfcfd 100%);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 30px;
      align-items: stretch;
    }

    .about-story {
      padding: 36px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(0, 169, 142, 0.06), rgba(0, 45, 93, 0.03));
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }

    .about-story h3 {
      font-size: 1.7rem;
      line-height: 1.28;
      letter-spacing: -0.04em;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 18px;
    }

    .about-story p {
      color: var(--text-sub);
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .about-points {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .about-point {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .about-point-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: var(--navy-soft);
      color: var(--navy);
    }

    .about-point strong {
      display: block;
      font-size: 1rem;
      color: var(--navy);
      margin-bottom: 4px;
      font-weight: 900;
    }

    .about-point p {
      margin: 0;
      font-size: 0.96rem;
      color: var(--text-sub);
    }

    .about-values {
      display: grid;
      gap: 14px;
    }

    .value-card {
      padding: 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--white);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .value-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .value-card:nth-child(1) {
      background: linear-gradient(180deg, #ffffff 0%, #f3fcf9 100%);
    }

    .value-card:nth-child(2) {
      background: linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%);
    }

    .value-card:nth-child(3) {
      background: linear-gradient(180deg, #ffffff 0%, #fffaf2 100%);
    }

    .value-card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .value-card-head .icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .value-card:nth-child(1) .icon {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .value-card:nth-child(2) .icon {
      background: var(--navy-soft);
      color: var(--navy);
    }

    .value-card:nth-child(3) .icon {
      background: #fff4de;
      color: #a96d00;
    }

    .value-card h4 {
      font-size: 1.12rem;
      color: var(--navy);
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .value-card p {
      color: var(--text-sub);
      font-size: 0.97rem;
    }

    /* ========================================================================
       06. 협회장 인사말
       ======================================================================== */
    .greeting-section {
      background:
        linear-gradient(135deg, #f8fbfb 0%, #ffffff 30%, #f4f8fb 100%);
      overflow: hidden;
    }

    .greeting-wrap {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 34px;
      align-items: center;
    }

    .greeting-photo {
      position: relative;
    }

    .greeting-photo-frame {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      min-height: 560px;
      background:
        linear-gradient(145deg, rgba(0, 45, 93, 0.06), rgba(0, 169, 142, 0.08));
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .greeting-photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .greeting-photo-badge {
      position: absolute;
      left: 20px;
      bottom: 20px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--navy);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0, 45, 93, 0.08);
    }

    .greeting-photo-badge strong {
      display: block;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .greeting-text {
      padding: 10px 0;
    }

    .quote-mark {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 1.35rem;
      margin-bottom: 18px;
    }

    .greeting-title {
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.2;
      letter-spacing: -0.05em;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .greeting-title .green {
      color: var(--green);
    }

    .greeting-copy {
      display: grid;
      gap: 14px;
      color: var(--text-sub);
      font-size: 1.03rem;
    }

    .greeting-sign {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-weight: 900;
      color: var(--navy);
      font-size: 1.07rem;
      line-height: 1.8;
    }

    /* ========================================================================
       07. 연혁
       ======================================================================== */
    .history-section {
      background: linear-gradient(180deg, var(--white) 0%, #f7fafc 100%);
    }

    .history-shell {
      position: relative;
      padding-left: 26px;
      margin-top: 10px;
    }

    .history-line {
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--green), rgba(0, 45, 93, 0.24));
      border-radius: 999px;
    }

    .history-list {
      display: grid;
      gap: 18px;
    }

    .history-item {
      position: relative;
      padding: 24px 24px 24px 32px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
    }

    .history-item::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 28px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--white);
      border: 5px solid var(--green);
      box-shadow: 0 0 0 5px rgba(0, 169, 142, 0.08);
    }

    .history-date {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--navy-soft);
      color: var(--navy);
      border-radius: 999px;
      font-weight: 900;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .history-title {
      font-size: 1.16rem;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }

    .history-desc {
      color: var(--text-sub);
      font-size: 0.98rem;
    }

    /* ========================================================================
       08. 회원업장
       ======================================================================== */
    .members-section {
      background:
        radial-gradient(circle at 90% 10%, rgba(0, 45, 93, 0.04), transparent 20%),
        linear-gradient(180deg, #f8fbfb 0%, #ffffff 100%);
    }

    .members-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .members-actions .left,
    .members-actions .right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .member-card {
      overflow: hidden;
      border-radius: 28px;
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .member-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
    }

    .member-slider {
      position: relative;
      height: 250px;
      overflow: hidden;
      background: #eef4f6;
    }

    .member-slides {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.35s ease;
    }

    .member-slide {
      width: 100%;
      height: 100%;
      flex-shrink: 0;
    }

    .member-slide img {
      height: 100%;
      object-fit: cover;
    }

    .member-slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--navy);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-sm);
      z-index: 2;
    }

    .member-slide-btn.prev {
      left: 12px;
    }

    .member-slide-btn.next {
      right: 12px;
    }

    .member-dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .member-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      transition: var(--transition);
    }

    .member-dot.active {
      width: 24px;
      background: var(--white);
    }

    .member-body {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px 22px 22px;
      flex: 1;
    }

    .member-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .member-title-wrap {
      min-width: 0;
    }

    .member-category {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--text-sub);
      font-size: 0.84rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .member-title {
      font-size: 1.26rem;
      line-height: 1.25;
      letter-spacing: -0.04em;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .member-owner {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .member-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 42%;
    }

    .member-summary {
      color: var(--text-sub);
      font-size: 0.97rem;
      line-height: 1.7;
      min-height: 68px;
    }

    .member-info {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
      background: var(--bg-1);
      border: 1px solid var(--line);
    }

    .member-info-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text-sub);
      font-size: 0.93rem;
    }

    .member-info-item i {
      width: 18px;
      flex-shrink: 0;
      color: var(--green-dark);
      margin-top: 3px;
    }

    .member-info-item strong {
      color: var(--navy);
      font-weight: 800;
      margin-right: 6px;
    }

    .member-benefit-preview {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 800;
      font-size: 0.92rem;
      display: none;
    }

    .member-benefit-preview.show {
      display: block;
    }

    .member-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }

    .member-btn {
      min-height: 48px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 0.93rem;
      transition: var(--transition);
    }

    .member-btn.link {
      background: var(--navy);
      color: var(--white);
    }

    .member-btn.link:hover {
      background: var(--navy-light);
    }

    .member-btn.detail {
      background: var(--white);
      color: var(--navy);
      border: 1px solid var(--line-strong);
    }

    .member-btn.detail:hover {
      background: var(--bg-1);
    }

    /* ========================================================================
       09. 업장 등록 안내 / 공지 / 홍보게시판
       ======================================================================== */
    .join-store-section {
      background:
        linear-gradient(135deg, #ffffff 0%, #f2f8f8 100%);
    }

    .join-store-box {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
      padding: 28px;
      border-radius: 30px;
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .join-store-left h3 {
      font-size: 1.7rem;
      line-height: 1.3;
      letter-spacing: -0.04em;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 14px;
    }

    .join-store-left p {
      color: var(--text-sub);
      margin-bottom: 14px;
    }

    .join-store-steps {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .join-store-step {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 18px;
      background: var(--bg-1);
      border: 1px solid var(--line);
    }

    .join-store-step .num {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: var(--navy);
      color: var(--white);
      font-weight: 900;
    }

    .join-store-step strong {
      display: block;
      color: var(--navy);
      font-weight: 900;
      margin-bottom: 5px;
    }

    .join-store-step span {
      color: var(--text-sub);
      font-size: 0.95rem;
    }

    .join-store-right {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(145deg, var(--navy) 0%, #11365e 100%);
      color: var(--white);
      display: grid;
      align-content: space-between;
      gap: 18px;
      min-height: 100%;
    }

    .join-store-right strong {
      display: block;
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .join-store-right p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.96rem;
    }

    .notice-board-section {
      background: linear-gradient(180deg, #f7fbfc 0%, #ffffff 100%);
    }

    .notice-board-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .notice-card {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--white);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .notice-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .notice-card-title {
      font-size: 1.14rem;
      color: var(--navy);
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: -0.03em;
    }

    .notice-card-date {
      color: var(--text-soft);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .notice-card-desc {
      color: var(--text-sub);
      font-size: 0.97rem;
      line-height: 1.75;
    }

    .notice-card-foot {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .promotion-section {
      background:
        linear-gradient(135deg, #ffffff 0%, #f4f8fb 100%);
    }

    .promotion-head-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--navy-soft);
      color: var(--navy);
      font-size: 0.92rem;
      font-weight: 900;
    }

    .promotion-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .promotion-card {
      overflow: hidden;
      border-radius: 28px;
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      transition: var(--transition);
    }

    .promotion-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
    }

    .promotion-thumb {
      height: 220px;
      overflow: hidden;
    }

    .promotion-thumb img {
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .promotion-card:hover .promotion-thumb img {
      transform: scale(1.05);
    }

    .promotion-body {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .promotion-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .promotion-store {
      color: var(--green-dark);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .promotion-date {
      color: var(--text-soft);
      font-size: 0.87rem;
      font-weight: 700;
    }

    .promotion-title {
      font-size: 1.16rem;
      color: var(--navy);
      line-height: 1.35;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .promotion-desc {
      color: var(--text-sub);
      font-size: 0.96rem;
      line-height: 1.72;
    }

    .promotion-foot {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ========================================================================
       10. FAQ / 가입문의 / 푸터
       ======================================================================== */
    .faq-section {
      background: linear-gradient(180deg, #f8fbfb 0%, #ffffff 100%);
    }

    .faq-list {
      display: grid;
      gap: 14px;
    }

    .faq-item {
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--white);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .faq-question {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 22px;
      text-align: left;
      color: var(--navy);
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .faq-question i {
      flex-shrink: 0;
      transition: transform 0.28s ease;
    }

    .faq-item.open .faq-question i {
      transform: rotate(180deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      border-top: 1px solid transparent;
    }

    .faq-item.open .faq-answer {
      border-top-color: var(--line);
    }

    .faq-answer-inner {
      padding: 20px 22px 24px;
      color: var(--text-sub);
      line-height: 1.8;
    }

    .cta-section {
      padding-top: 34px;
      padding-bottom: 110px;
      background: linear-gradient(180deg, #ffffff 0%, #f5f9fb 100%);
    }

    .cta-box {
      position: relative;
      overflow: hidden;
      padding: 38px;
      border-radius: 34px;
      background:
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.18), transparent 24%),
        linear-gradient(135deg, var(--navy) 0%, #123d71 54%, var(--green-dark) 100%);
      box-shadow: var(--shadow-lg);
      color: var(--white);
    }

    .cta-box::before {
      content: "";
      position: absolute;
      right: -60px;
      bottom: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .cta-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: center;
    }

    .cta-title {
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.18;
      letter-spacing: -0.05em;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .cta-desc {
      color: rgba(255, 255, 255, 0.84);
      font-size: 1.05rem;
      max-width: 700px;
    }

    .cta-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cta-actions .btn {
      min-width: 190px;
      min-height: 56px;
    }

    .cta-actions .btn.white {
      background: var(--white);
      color: var(--navy);
      font-weight: 900;
    }

    .cta-actions .btn.glass {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--white);
      font-weight: 900;
    }

    .site-footer {
      background: #071521;
      color: rgba(255, 255, 255, 0.72);
      padding-top: 44px;
      padding-bottom: 44px;
    }

    .footer-inner {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 30px;
      align-items: start;
    }

    .footer-title {
      color: var(--white);
      font-size: 1.24rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .footer-copy {
      max-width: 700px;
      line-height: 1.8;
      font-size: 0.97rem;
    }

    .footer-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .footer-links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--white);
      font-weight: 800;
    }

    .footer-bottom {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    /* ========================================================================
       11. 플로팅 / 모달
       ======================================================================== */
    .floating-actions {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .floating-btn {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: var(--white);
      font-size: 1.05rem;
      box-shadow: var(--shadow-md);
    }

    .floating-btn.kakao {
      background: linear-gradient(135deg, #00a98e, #008d76);
    }

    .floating-btn.phone {
      background: linear-gradient(135deg, #002d5d, #123d71);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 19, 32, 0.56);
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: min(100%, 1000px);
      max-height: min(90vh, 900px);
      overflow: auto;
      background: var(--white);
      border-radius: 28px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--line);
      transform: translateY(14px);
      transition: transform 0.28s ease;
    }

    .modal-overlay.show .modal {
      transform: translateY(0);
    }

    .modal.small {
      width: min(100%, 720px);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      font-size: 1.22rem;
      color: var(--navy);
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .modal-close {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--white);
      border: 1px solid var(--line-strong);
      color: var(--navy);
      flex-shrink: 0;
    }

    .modal-body {
      padding: 22px;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .detail-gallery {
      display: grid;
      gap: 12px;
    }

    .detail-main-image {
      border-radius: 22px;
      overflow: hidden;
      height: 360px;
      background: var(--bg-1);
      border: 1px solid var(--line);
    }

    .detail-main-image img {
      height: 100%;
      object-fit: cover;
    }

    .detail-thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .detail-thumb {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      cursor: pointer;
      height: 110px;
    }

    .detail-thumb img {
      height: 100%;
      object-fit: cover;
    }

    .detail-content {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .detail-category {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      width: fit-content;
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--text-sub);
    }

    .detail-name {
      font-size: 2rem;
      line-height: 1.2;
      color: var(--navy);
      letter-spacing: -0.05em;
      font-weight: 900;
    }

    .detail-summary {
      color: var(--text-sub);
      line-height: 1.8;
      font-size: 1rem;
    }

    .detail-info {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 20px;
      background: var(--bg-1);
      border: 1px solid var(--line);
    }

    .detail-info-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--text-sub);
      font-size: 0.97rem;
    }

    .detail-info-row i {
      width: 18px;
      margin-top: 4px;
      color: var(--green-dark);
      flex-shrink: 0;
    }

    .detail-info-row strong {
      color: var(--navy);
      font-weight: 900;
      margin-right: 6px;
    }

    .detail-long-copy {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--text-sub);
      line-height: 1.85;
    }

    .detail-benefit {
      padding: 18px;
      border-radius: 20px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 800;
      line-height: 1.8;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .auth-guide,
    .form-guide {
      padding: 18px;
      border-radius: 18px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--text-sub);
      line-height: 1.8;
    }

    .auth-guide strong,
    .form-guide strong {
      color: var(--navy);
      font-weight: 900;
    }

    .code-box {
      margin-top: 14px;
      padding: 16px;
      border-radius: 16px;
      background: #091725;
      color: #dff8f3;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9rem;
      overflow: auto;
      line-height: 1.7;
    }

    .auth-grid,
    .form-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .field-group {
      display: grid;
      gap: 8px;
    }

    .field-group label {
      color: var(--navy);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .field-group input,
    .field-group textarea,
    .field-group select {
      width: 100%;
      border: 1px solid var(--line-strong);
      background: var(--white);
      border-radius: 14px;
      padding: 14px 14px;
      color: var(--text-main);
      outline: none;
      transition: var(--transition);
    }

    .field-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      border-color: rgba(0, 169, 142, 0.48);
      box-shadow: 0 0 0 4px rgba(0, 169, 142, 0.08);
    }

    .field-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .upload-box {
      min-height: 120px;
      border-radius: 16px;
      border: 1px dashed var(--line-strong);
      background: var(--bg-1);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--text-soft);
      padding: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .checkbox-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 999px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      font-weight: 800;
      color: var(--navy);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    /* ========================================================================
       12. 반응형
       ======================================================================== */
    @media (max-width: 1180px) {
      .hero-inner,
      .about-grid,
      .greeting-wrap,
      .cta-inner,
      .join-store-box,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .member-grid,
      .promotion-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .notice-board-grid {
        grid-template-columns: 1fr;
      }

      .hero-panel {
        min-height: auto;
      }

      .hero-panel-card {
        min-height: 520px;
      }

      .cta-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 980px) {
      .desktop-nav,
      .header-actions {
        display: none;
      }

      .mobile-menu-btn {
        display: inline-grid;
        place-items: center;
      }

      .mobile-only {
        display: block;
      }

      .desktop-only {
        display: none;
      }

      .hero {
        padding-top: calc(var(--header-height) + 32px);
      }

      .hero-note-list {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        grid-template-columns: 1fr;
      }

      .footer-links {
        justify-content: flex-start;
      }
    }

    @media (max-width: 768px) {
      .section {
        padding-top: 84px;
        padding-bottom: 84px;
      }

      .container {
        padding-left: 16px;
        padding-right: 16px;
      }

      .brand-title {
        font-size: 1rem;
      }

      .brand-sub {
        font-size: 0.76rem;
      }

      .hero-title {
        font-size: clamp(2rem, 9vw, 3rem);
      }

      .hero-desc {
        font-size: 1rem;
      }

      .hero-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .hero-actions .btn {
        width: 100%;
      }

      .hero-panel-card {
        min-height: auto;
        padding: 22px;
      }

      .notice-strip {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .notice-link {
        display: none;
      }

      .search-shell {
        padding: 18px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .about-story,
      .join-store-box,
      .cta-box,
      .modal-body,
      .modal-head {
        padding-left: 18px;
        padding-right: 18px;
      }

      .member-grid,
      .promotion-grid {
        grid-template-columns: 1fr;
      }

      .member-slider {
        height: 220px;
      }

      .member-body {
        padding: 18px;
      }
